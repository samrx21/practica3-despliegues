<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Health Check</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0fdf4;
    }
    .card {
      text-align: center;
      padding: 40px 60px;
      background: white;
      border: 1px solid #bbf7d0;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { color: #16a34a; font-size: 2rem; margin-bottom: 8px; }
    p { color: #64748b; font-size: 0.9rem; }
    .timestamp { margin-top: 16px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>OK</h1>
    <p>El servicio está funcionando correctamente.</p>
    <p>AppInventario — Health Check</p>
    <p class="timestamp" id="ts"></p>
  </div>
  <script>
    document.getElementById('ts').textContent =
      'Verificado: ' + new Date().toLocaleString('es-CO');
  </script>
</body>
</html>
